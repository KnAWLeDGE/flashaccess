# FlashAccess — nginx site config
# Place in /etc/nginx/sites-available/flashaccess, then:
#   ln -s /etc/nginx/sites-available/flashaccess /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Prerequisites:
#   - Cloudflare Full (Strict) TLS in front of this server
#   - Origin certificate in /etc/ssl/cloudflare/ (or adjust ssl_certificate paths)
#   - Replace YOURDOMAIN.COM with your actual domain

# ── Trust only Cloudflare IPs for the CF-Connecting-IP header ──────────────
# FlashAccess reads CF-Connecting-IP to enforce per-session IP restrictions.
# Without this block, any client could spoof the header.
# Current Cloudflare IPv4 ranges (update periodically or use
# https://www.cloudflare.com/ips-v4 in a cron job):
geo $cloudflare_ip {
    default         0;
    103.21.244.0/22  1;
    103.22.200.0/22  1;
    103.31.4.0/22    1;
    104.16.0.0/13    1;
    104.24.0.0/14    1;
    108.162.192.0/18 1;
    131.0.72.0/22    1;
    141.101.64.0/18  1;
    162.158.0.0/15   1;
    172.64.0.0/13    1;
    173.245.48.0/20  1;
    188.114.96.0/20  1;
    190.93.240.0/20  1;
    197.234.240.0/22 1;
    198.41.128.0/17  1;
}

server {
    listen 443 ssl http2;
    server_name YOURDOMAIN.COM;

    # Cloudflare origin certificate
    ssl_certificate     /etc/ssl/cloudflare/origin.crt;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Only accept traffic from Cloudflare
    # (Cloudflare IPs — use cloudflare-ips cron to keep updated)
    # allow 103.21.244.0/22;
    # allow 103.22.200.0/22;
    # ... (add full list from https://www.cloudflare.com/ips-v4)
    # deny all;

    # Strip any client-supplied CF-Connecting-IP if not from Cloudflare
    set $real_connecting_ip "";
    if ($cloudflare_ip = 1) {
        set $real_connecting_ip $http_cf_connecting_ip;
    }

    location / {
        proxy_pass         http://127.0.0.1:7432;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        # Forward the verified CF-Connecting-IP (empty string if not from CF)
        proxy_set_header   CF-Connecting-IP  $real_connecting_ip;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name YOURDOMAIN.COM;
    return 301 https://$host$request_uri;
}
